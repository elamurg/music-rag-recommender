name: CI

on: 
  push: 
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test: 
    runs-on: ubuntu-latest

    steps: 
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements-dev.txt
      - name: Lint with flake8
        run: flake8 src/ tests/ --max-line-length = 100
      - name: Run tests
        run: pytest tests/
        